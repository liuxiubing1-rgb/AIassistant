<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配 iPhone，禁止缩放，实现原生 App 体验 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 英语私教</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 隐藏滚动条但保持可滚动 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <!-- 顶部导航栏 -->
    <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-lg font-bold">AI 英语私教</h1>
        <div class="flex gap-3">
            <button id="langToggleBtn" class="bg-blue-500 px-3 py-1 rounded text-sm font-medium border border-blue-400">
                当前: 英文模式
            </button>
            <button id="settingsBtn" class="text-white"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <!-- 设置弹窗 (API Key 配置) -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-lg p-6 w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">设置</h2>
            <p class="text-xs text-gray-500 mb-2">请输入你的 OpenAI API Key (数据仅保存在本地浏览器)</p>
            <input type="password" id="apiKeyInput" placeholder="sk-..." class="w-full border rounded p-2 mb-4">
            <div class="flex justify-end gap-2">
                <button id="closeSettingsBtn" class="px-4 py-2 bg-gray-200 rounded">取消</button>
                <button id="saveSettingsBtn" class="px-4 py-2 bg-blue-600 text-white rounded">保存</button>
            </div>
        </div>
    </div>

    <!-- 聊天记录区 -->
    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 no-scrollbar pb-24">
        <div class="bg-white p-3 rounded-lg rounded-tl-none shadow max-w-[85%] self-start border border-gray-100">
            <p class="text-gray-800">你好！我是你的 AI 英语助手。我可以：<br>1. 翻译你的中文并解答问题。<br>2. 听你的英文发音并纠正语法/发音。<br>请点击下方麦克风开始说话吧！</p>
        </div>
    </main>

    <!-- 底部输入区 -->
    <footer class="bg-white border-t p-3 fixed bottom-0 w-full flex items-center gap-2 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button id="micBtn" class="bg-gray-100 w-12 h-12 rounded-full flex justify-center items-center text-gray-600 active:bg-blue-100 active:text-blue-600 transition">
            <i class="fas fa-microphone text-xl"></i>
        </button>
        <input type="text" id="textInput" placeholder="输入文字或按左侧语音..." class="flex-1 border-gray-300 border rounded-full px-4 py-2 focus:outline-none focus:border-blue-500">
        <button id="sendBtn" class="bg-blue-600 w-12 h-12 rounded-full flex justify-center items-center text-white active:bg-blue-700 transition">
            <i class="fas fa-paper-plane text-lg -ml-1"></i>
        </button>
    </footer>

    <script>
        // === 状态管理 ===
        let currentLang = 'en'; // 'en' 或 'zh'
        let apiKey = localStorage.getItem('openai_api_key') || '';
        let chatHistory =[];

        // === DOM 元素 ===
        const chatContainer = document.getElementById('chatContainer');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const langToggleBtn = document.getElementById('langToggleBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');

        // === 语音识别 (兼容 iPhone Safari) ===
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isRecording = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('bg-red-500', 'text-white', 'animate-pulse');
                micBtn.classList.remove('bg-gray-100', 'text-gray-600');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                textInput.value = transcript;
                sendMessage(transcript); // 识别后自动发送
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                alert("语音识别失败，请检查麦克风权限。");
                stopRecording();
            };

            recognition.onend = () => {
                stopRecording();
            };
        } else {
            micBtn.style.display = 'none'; // 不支持则隐藏
            alert("你的浏览器不支持语音识别功能，请使用最新版 Safari 或 Chrome。");
        }

        function stopRecording() {
            isRecording = false;
            micBtn.classList.remove('bg-red-500', 'text-white', 'animate-pulse');
            micBtn.classList.add('bg-gray-100', 'text-gray-600');
            if(recognition) recognition.stop();
        }

        // === 事件监听 ===
        micBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                if (recognition) {
                    // 根据当前模式设置识别语言
                    recognition.lang = currentLang === 'en' ? 'en-US' : 'zh-CN';
                    recognition.start();
                }
            }
        });

        langToggleBtn.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            langToggleBtn.innerText = currentLang === 'en' ? '当前: 英文模式' : '当前: 中文模式';
            langToggleBtn.classList.toggle('bg-blue-500');
            langToggleBtn.classList.toggle('bg-green-500');
            langToggleBtn.classList.toggle('border-blue-400');
            langToggleBtn.classList.toggle('border-green-400');
        });

        sendBtn.addEventListener('click', () => {
            if (textInput.value.trim()) sendMessage(textInput.value.trim());
        });

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && textInput.value.trim()) sendMessage(textInput.value.trim());
        });

        // 设置页面逻辑
        settingsBtn.addEventListener('click', () => {
            apiKeyInput.value = apiKey;
            settingsModal.classList.remove('hidden');
        });
        closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
        saveSettingsBtn.addEventListener('click', () => {
            apiKey = apiKeyInput.value.trim();
            localStorage.setItem('openai_api_key', apiKey);
            settingsModal.classList.add('hidden');
            alert("API Key 已保存！");
        });

        // === UI 更新 ===
        function addMessageToUI(sender, text) {
            const msgDiv = document.createElement('div');
            const isUser = sender === 'user';
            
            msgDiv.className = `p-3 rounded-lg shadow max-w-[85%] border ${
                isUser ? 'bg-blue-600 text-white self-end rounded-tr-none' 
                       : 'bg-white text-gray-800 self-start rounded-tl-none border-gray-100'
            }`;
            
            // 如果是 AI 回复，增加朗读按钮
            let readBtnHTML = '';
            if (!isUser) {
                readBtnHTML = `<button onclick="speakText(this, '${text.replace(/'/g, "\\'")}')" class="mt-2 text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded hover:bg-gray-200"><i class="fas fa-volume-up"></i> 朗读英文</button>`;
            }

            msgDiv.innerHTML = `<p class="whitespace-pre-wrap text-sm leading-relaxed">${text}</p>${readBtnHTML}`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // === 语音播报 (TTS) ===
        function speakText(btnElement, text) {
            // 过滤出英文进行朗读（简单的正则匹配）
            const engText = text.replace(/[\u4e00-\u9fa5]/g, '');
            if (!engText.trim()) return;

            const utterance = new SpeechSynthesisUtterance(engText);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; // 稍微放慢语速方便学习
            window.speechSynthesis.speak(utterance);
        }

        // === 核心：调用大语言模型 ===
        async function sendMessage(text) {
            if (!apiKey) {
                alert("请先点击右上角设置按钮配置 API Key！");
                settingsModal.classList.remove('hidden');
                return;
            }

            textInput.value = '';
            addMessageToUI('user', text);

            // 构造系统提示词（Prompt Engineering）
            let systemPrompt = `你是一个专业的英语私教。`;
            if (currentLang === 'zh') {
                systemPrompt += `用户当前处于【中文模式】。你的任务是：
                1. 将用户的中文直接翻译成地道、自然的英语。
                2. 如果用户提出了问题（比如不知道某个东西怎么说，或者问语法），请用中文解答，并给出参考的英文表达。
                3. 排版清晰，可以直接给出翻译结果。`;
            } else {
                systemPrompt += `用户当前处于【英文模式】（用户在使用英语发音或打字）。由于前端语音识别可能出现偏差，你的任务是：
                1. 理解用户的意图。如果用户的英文句子存在语法错误，请用中文温和地指出并纠正。
                2. 【发音纠正】：由于用户是通过语音识别输入的，如果句子出现明显发音相似导致的拼写错误（例如将 'think' 识别成 'sink'），请告诉用户：“听起来你的XX单词发音可能不太准确，它容易被识别为XX，正确发音请注意XX”。
                3. 用地道的英文回答用户的对话，并在最后附上一段简短的中文解释。`;
            }

            const messages =[
                { role: "system", content: systemPrompt },
                ...chatHistory,
                { role: "user", content: text }
            ];

            // UI 提示加载中
            const loadingId = "loading-" + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = "p-3 rounded-lg shadow max-w-[85%] self-start bg-gray-100 text-gray-500 rounded-tl-none border-gray-100 text-sm italic";
            loadingDiv.innerText = "正在思考...";
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // 调用 OpenAI API (你可以修改 baseUrl 以适应代理或其他兼容模型如 DeepSeek)
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo', // 或 gpt-4o
                        messages: messages,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.error) {
                    addMessageToUI('ai', `请求失败: ${data.error.message}`);
                    return;
                }

                const aiReply = data.choices[0].message.content;
                
                // 更新上下文
                chatHistory.push({ role: "user", content: text });
                chatHistory.push({ role: "assistant", content: aiReply });
                // 限制历史记录长度
                if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);

                addMessageToUI('ai', aiReply);

            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessageToUI('ai', `网络错误: ${error.message}`);
            }
        }
    </script>
</body>
</html>
